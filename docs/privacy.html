<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none';style-src 'unsafe-inline' https://fonts.googleapis.com;font-src https://fonts.gstatic.com;script-src 'unsafe-inline';img-src data:;connect-src 'none';">
<meta name="referrer" content="no-referrer">
<meta name="description" content="SecFERRO Division — Privacy Protocol Dossier">
<title>SecFERRO Division — Privacy Protocol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --c:#00e5ff;--cm:rgba(0,229,255,.12);--cd:rgba(0,229,255,.5);
  --r:#e50000;--g:#00ff88;
  --bg:#020407;
  --mono:'Share Tech Mono',monospace;
  --head:'Rajdhani','Segoe UI',sans-serif;
  --gap:16px;
}
/* ── RESET ── */
:where(*,*::before,*::after){margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);font-family:var(--mono);overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;color:#fff;}
/* ── CANVAS ── */
#bg{position:fixed;inset:0;z-index:0;transition:opacity 1s ease;}
/* ── LAYERS ── */
.layer{position:fixed;inset:0;pointer-events:none;}
.l-scan{z-index:92;background:repeating-linear-gradient(to bottom,transparent 0,transparent 2px,rgba(0,0,0,.09) 2px,rgba(0,0,0,.09) 4px);}
.l-vig{z-index:91;background:radial-gradient(ellipse at 50% 50%,transparent 28%,rgba(0,0,0,.88) 100%);}
.l-sweep{z-index:90;opacity:0;background:linear-gradient(to bottom,transparent 47%,rgba(0,229,255,.025) 50%,transparent 53%);animation:sweep 9s infinite 4s;}
.l-err{z-index:89;background:rgba(229,0,0,.04);opacity:0;animation:errF 13s infinite 7s;}
/* ── SHARED KEYFRAMES ── */
@keyframes sweep{0%,90%,100%{opacity:0;transform:none;}91%{opacity:1;transform:translateX(-4px);}92%{opacity:0;}94%{opacity:1;transform:translateX(4px);}95%{opacity:0;}}
@keyframes errF{0%,93%,100%{opacity:0;}94%{opacity:1;}95%{opacity:0;}97%{opacity:.3;}98%{opacity:0;}}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}
@keyframes ringOut{0%{transform:scale(.7);opacity:.7;}100%{transform:scale(1.1);opacity:0;}}
@keyframes draw{to{stroke-dashoffset:0;}}
@keyframes rotCW{to{transform:rotate(360deg);}}
@keyframes rotCCW{to{transform:rotate(-360deg);}}
@keyframes shFloat{
  0%,100%{transform:translateY(0);filter:drop-shadow(0 0 6px var(--c)) drop-shadow(0 0 20px rgba(0,180,220,.55));}
  50%{transform:translateY(-8px);filter:drop-shadow(0 0 14px #0ff) drop-shadow(0 0 38px rgba(0,210,240,.8)) drop-shadow(0 0 72px rgba(0,120,185,.4));}}
@keyframes gF{0%,87%,100%{transform:none;clip-path:none;color:#fff;}88%{transform:skewX(-12deg) translateX(-4px);clip-path:polygon(0 8%,100% 8%,100% 33%,0 33%);color:var(--c);}89%{transform:skewX(7deg) translateX(3px);clip-path:polygon(0 62%,100% 62%,100% 86%,0 86%);color:#fff;}90%{transform:none;clip-path:none;}92%{transform:translateX(-3px);}93%{transform:translateX(3px);}94%{transform:none;}}
@keyframes gA{0%,85%,100%{transform:none;color:var(--r);}86%{transform:skewX(14deg) translateX(5px);color:#f44;text-shadow:-3px 0 var(--c),3px 0 var(--r);}87%{transform:skewX(-7deg) translateX(-3px);}88%{transform:none;}91%{transform:translateX(4px);}92%{transform:translateX(-4px);}93%{transform:none;}}
@keyframes lA{0%,100%{opacity:.1;transform:translateY(0);filter:blur(5px);color:#333;}50%{opacity:1;transform:translateY(-13px);filter:blur(0);color:#fff;text-shadow:0 0 10px #fff,0 0 22px var(--c),0 0 48px rgba(0,180,210,.5);}}
@keyframes ndG{0%,100%{box-shadow:0 0 4px var(--c);}50%{box-shadow:0 0 10px var(--c),0 0 18px rgba(0,229,255,.6);}}
@keyframes ndP{0%,100%{opacity:.3;}50%{opacity:.95;}}
@keyframes wmB{0%,100%{opacity:.5;letter-spacing:.1em;}50%{opacity:.06;letter-spacing:.16em;}}
@keyframes agG{0%,84%,100%{transform:none;clip-path:none;color:var(--g);}85%{transform:skewX(-10deg) translateX(-5px);clip-path:polygon(0 15%,100% 15%,100% 40%,0 40%);color:var(--c);}86%{transform:skewX(8deg) translateX(4px);clip-path:polygon(0 60%,100% 60%,100% 85%,0 85%);color:var(--g);}87%{transform:none;clip-path:none;}}
@keyframes agSw{to{left:100%;}}
@keyframes agP{0%,100%{opacity:.3;}50%{opacity:1;}}
@keyframes artIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:none;}}
/* ── PHASE 1: LOADER ── */
#ph-loader{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:560px;padding:14px;transition:opacity .5s ease,transform .5s ease;}
#ph-loader.out{opacity:0;transform:translateY(-28px);pointer-events:none;}
.shield-wrap{position:relative;display:flex;justify-content:center;align-items:center;}
.ring{position:absolute;border-radius:50%;border:1px solid var(--cm);animation:ringOut 3.4s ease-out infinite;}
.ring:nth-child(1){width:186px;height:186px;}
.ring:nth-child(2){width:222px;height:222px;animation-delay:1.13s;}
.ring:nth-child(3){width:258px;height:258px;animation-delay:2.27s;}
.sh-svg{width:148px;height:180px;animation:shFloat 4.2s ease-in-out infinite;}
.cp{stroke-dasharray:200;stroke-dashoffset:200;animation:draw 1.8s ease forwards;}
.cp.d1{animation-delay:.3s;}.cp.d2{animation-delay:.55s;}.cp.d3{animation-delay:.8s;}.cp.d4{animation-delay:1.05s;}
.rot{transform-origin:77px 88px;animation:rotCW 7s linear infinite;}
.rot2{transform-origin:77px 88px;animation:rotCCW 10s linear infinite;}
.sh-label{position:absolute;bottom:20px;display:flex;flex-direction:column;align-items:center;gap:3px;pointer-events:none;animation:shFloat 4.2s ease-in-out infinite;}
.sh-name{font-size:.6rem;font-weight:800;letter-spacing:.32em;color:var(--c);text-shadow:0 0 10px var(--c),0 0 22px rgba(0,200,230,.5);}
.sh-bar{width:44px;height:1px;background:linear-gradient(to right,transparent,rgba(0,229,255,.85),transparent);}
.sh-div{font-size:.36rem;letter-spacing:.24em;color:rgba(0,200,220,.48);}
.t-block{display:flex;flex-direction:column;align-items:center;gap:3px;}
.t-row{display:flex;align-items:baseline;}
.ferro,.art{font-family:var(--head);font-size:clamp(2.6rem,9vw,4.6rem);font-weight:900;letter-spacing:.04em;}
.ferro{color:#fff;animation:gF 7s infinite;}
.art{color:var(--r);text-shadow:0 0 14px rgba(229,0,0,.7);animation:gA 7s infinite .3s;}
.subtitle,.div-tag{text-transform:uppercase;}
.subtitle{font-size:.58rem;letter-spacing:.44em;color:rgba(255,255,255,.28);}
.div-tag{font-size:.46rem;letter-spacing:.28em;color:var(--c);opacity:.5;}
.nodes{display:flex;gap:10px;align-items:center;}
.node{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:.4rem;letter-spacing:.12em;color:rgba(0,229,255,.45);}
.nd{width:6px;height:6px;border-radius:50%;background:var(--c);}
.nsep{color:rgba(0,229,255,.18);}
.status-el{font-size:.56rem;letter-spacing:.14em;color:var(--c);opacity:.7;min-height:1em;text-shadow:0 0 8px rgba(0,229,255,.5);transition:opacity .2s;}
.cur{display:inline-block;width:6px;height:.8em;background:var(--c);margin-left:2px;vertical-align:middle;animation:blink .7s infinite;}
.bar-wrap{width:100%;max-width:420px;position:relative;padding-top:18px;}
.bar-label{position:absolute;left:0;top:0;font-size:.42rem;letter-spacing:.15em;color:rgba(0,229,255,.4);}
.bar-pct{position:absolute;right:0;top:0;font-size:.56rem;color:var(--c);letter-spacing:.1em;text-shadow:0 0 6px var(--c);}
.hex-row{display:flex;gap:2px;flex-wrap:wrap;}
.hs{width:13px;height:13px;flex-shrink:0;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%);background:rgba(0,229,255,.07);transition:background .12s,box-shadow .12s;}
.hs.on{background:var(--c);box-shadow:0 0 5px var(--c),0 0 10px rgba(0,229,255,.45);}
.hs.hd{background:#fff;box-shadow:0 0 7px #fff,0 0 14px var(--c),0 0 26px rgba(0,229,255,.4);}
.lw{display:flex;gap:2px;margin-top:2px;}
.ll{font-size:clamp(1.1rem,3.8vw,1.7rem);font-weight:900;letter-spacing:.1em;color:#fff;animation:lA 1.6s cubic-bezier(.45,.05,.55,.95) infinite;}
.ll:nth-child(1){animation-delay:0s;}.ll:nth-child(2){animation-delay:.11s;}.ll:nth-child(3){animation-delay:.22s;}
.ll:nth-child(4){animation-delay:.33s;}.ll:nth-child(5){animation-delay:.44s;}.ll:nth-child(6){animation-delay:.55s;}.ll:nth-child(7){animation-delay:.66s;}
/* ── PHASE 2: ACCESS ── */
#ph-access{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:14px;background:rgba(2,4,7,.96);opacity:0;pointer-events:none;transition:opacity .25s;}
#ph-access.active{opacity:1;pointer-events:all;}
.ag-top{font-size:.44rem;letter-spacing:.36em;color:var(--c);text-shadow:0 0 10px var(--c);animation:agP 1.2s ease-in-out infinite;}
.ag-main{font-family:var(--head);font-weight:900;font-size:clamp(2rem,8vw,3.4rem);letter-spacing:.16em;color:var(--g);text-shadow:0 0 20px var(--g),0 0 50px rgba(0,200,100,.5);animation:agG 2.5s infinite;}
.ag-sub{font-size:.52rem;letter-spacing:.26em;color:rgba(0,255,136,.6);}
.ag-cls{font-size:.42rem;letter-spacing:.18em;color:var(--cd);margin-top:6px;}
.ag-sweep{width:200px;height:2px;background:rgba(0,255,136,.1);position:relative;overflow:hidden;}
.ag-sweep::after{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;background:linear-gradient(to right,transparent,var(--g),transparent);animation:agSw 1.4s linear infinite;}
/* ── PHASE 3: DOSSIER ── */
#ph-dossier{position:fixed;inset:0;z-index:50;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;opacity:0;pointer-events:none;transition:opacity .6s ease .2s;scrollbar-width:thin;scrollbar-color:var(--c) var(--bg);}
#ph-dossier::-webkit-scrollbar{width:3px;}
#ph-dossier::-webkit-scrollbar-thumb{background:var(--c);border-radius:2px;}
#ph-dossier.active{opacity:1;pointer-events:all;}
.cls-bar{position:sticky;top:0;z-index:5;background:rgba(2,4,7,.94);border-bottom:1px solid rgba(229,0,0,.38);padding:7px var(--gap);display:flex;justify-content:space-between;align-items:center;gap:8px;backdrop-filter:blur(8px);}
.cls-tag{font-size:.38rem;letter-spacing:.18em;color:var(--r);text-shadow:0 0 8px var(--r);animation:blink .9s infinite;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lang-sw{display:flex;gap:4px;flex-shrink:0;}
.lbtn{font-size:.36rem;letter-spacing:.12em;padding:2px 5px;border:1px solid rgba(0,229,255,.2);color:rgba(0,229,255,.45);background:transparent;cursor:pointer;font-family:var(--mono);transition:all .18s;}
.lbtn:hover,.lbtn.active{border-color:var(--c);color:var(--c);background:rgba(0,229,255,.06);text-shadow:0 0 6px var(--c);}
.cls-sess{font-size:.34rem;letter-spacing:.1em;color:rgba(0,229,255,.4);flex-shrink:0;}
.dos-inner{max-width:640px;margin:0 auto;padding:20px var(--gap) 70px;display:flex;flex-direction:column;gap:20px;}
.meta-block{border:1px solid rgba(0,229,255,.18);padding:14px;background:rgba(0,229,255,.02);position:relative;}
.meta-block::before,.meta-block::after,.meta-block .bc::before,.meta-block .bc::after{content:'';position:absolute;width:8px;height:8px;border-color:var(--c);border-style:solid;}
.meta-block::before{top:-1px;left:-1px;border-width:1px 0 0 1px;}
.meta-block::after{top:-1px;right:-1px;border-width:1px 1px 0 0;}
.meta-block .bc::before{bottom:-1px;left:-1px;border-width:0 0 1px 1px;}
.meta-block .bc::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}
.mrow{display:flex;justify-content:space-between;align-items:baseline;font-size:.4rem;letter-spacing:.1em;color:rgba(0,229,255,.55);padding:3px 0;border-bottom:1px solid rgba(0,229,255,.05);}
.mrow:last-child{border-bottom:none;}
.mk{color:rgba(0,229,255,.3);flex-shrink:0;margin-right:8px;}
.mv{color:var(--c);text-align:right;word-break:break-all;}
.mv.g{color:var(--g);}
.mv.hash{color:rgba(0,229,255,.5);font-size:.36rem;}
.live-row{display:flex;gap:6px;flex-wrap:wrap;}
.lcard{flex:1;min-width:110px;border:1px solid rgba(0,229,255,.12);background:rgba(0,229,255,.02);padding:7px 10px;display:flex;flex-direction:column;gap:4px;}
.lc-lbl{font-size:.34rem;letter-spacing:.14em;color:rgba(0,229,255,.38);}
.lc-val{font-size:.58rem;letter-spacing:.1em;color:var(--c);}
.lc-val.g{color:var(--g);}
.lc-val.r{color:var(--r);}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:4px;vertical-align:middle;}
.dot.g{background:var(--g);box-shadow:0 0 6px var(--g);animation:blink .8s infinite;}
.dot.r{background:var(--r);box-shadow:0 0 6px var(--r);animation:blink .6s infinite .3s;}
.badge-row{display:flex;gap:5px;flex-wrap:wrap;}
.badge{font-size:.34rem;letter-spacing:.1em;padding:3px 7px;border:1px solid rgba(0,229,255,.18);color:rgba(0,229,255,.55);background:rgba(0,229,255,.04);}
.badge.g{border-color:rgba(0,255,136,.28);color:rgba(0,255,136,.65);background:rgba(0,255,136,.04);}
.badge.r{border-color:rgba(229,0,0,.28);color:rgba(229,0,0,.65);background:rgba(229,0,0,.04);}
.pol-head{text-align:center;padding:8px 0;}
.pol-title{font-family:var(--head);font-size:clamp(1.5rem,5vw,2.4rem);font-weight:900;letter-spacing:.14em;color:#fff;}
.pol-title em{color:var(--r);font-style:normal;text-shadow:0 0 14px var(--r);}
.pol-div{height:1px;background:linear-gradient(to right,transparent,rgba(0,229,255,.4),rgba(229,0,0,.3),transparent);margin:8px 0;}
.pol-dates,.pol-entity{font-size:.4rem;letter-spacing:.1em;color:rgba(0,229,255,.45);}
.pol-dates{letter-spacing:.16em;margin-bottom:4px;}
.pol-entity{line-height:2;}
.pol-entity a{color:var(--c);text-decoration:none;border-bottom:1px solid rgba(0,229,255,.2);}
.rdct{display:inline;background:var(--c);color:transparent;border-radius:2px;padding:0 2px;transition:background .6s,color .6s;cursor:default;}
.rdct.show{background:transparent;color:var(--c);text-shadow:0 0 8px rgba(0,229,255,.5);}
.intro-p{font-size:.44rem;line-height:1.9;color:rgba(255,255,255,.45);letter-spacing:.05em;}
.article{animation:artIn .55s ease both;}
.art-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.art-num{font-size:.36rem;letter-spacing:.22em;color:var(--r);text-shadow:0 0 6px var(--r);}
.art-line{flex:1;height:1px;background:linear-gradient(to right,rgba(229,0,0,.4),rgba(0,229,255,.18),transparent);}
.art-h2{font-family:var(--head);font-size:.9rem;font-weight:700;letter-spacing:.18em;color:var(--c);text-shadow:0 0 10px rgba(0,229,255,.35);text-transform:uppercase;margin-bottom:8px;}
.art-body{font-size:.46rem;line-height:2;color:rgba(255,255,255,.6);letter-spacing:.05em;}
.art-body p+p,.art-body p+ol,.art-body ol+p{margin-top:7px;}
.art-body ol{padding-left:1.3em;margin:6px 0;}
.art-body li{margin-bottom:3px;color:rgba(0,229,255,.65);}
.art-body li::marker{color:var(--r);}
.art-body a{color:var(--c);text-decoration:none;border-bottom:1px solid rgba(0,229,255,.2);}
.art-note{margin-top:10px;padding:7px 10px;border-left:2px solid rgba(0,229,255,.3);background:rgba(0,229,255,.03);font-size:.4rem;letter-spacing:.1em;color:rgba(0,229,255,.5);}
.art-contact{margin-top:8px;color:var(--c);font-size:.46rem;line-height:2;}
.art-contact a{color:var(--c);text-decoration:none;border-bottom:1px solid rgba(0,229,255,.2);}
.pgp-block{border:1px solid rgba(0,229,255,.14);padding:12px;background:rgba(0,229,255,.02);font-size:.36rem;letter-spacing:.1em;line-height:2.1;color:rgba(0,229,255,.4);}
.pgp-block .pv{color:rgba(0,229,255,.65);}
.dos-footer{text-align:center;padding:18px 0 8px;border-top:1px solid rgba(0,229,255,.08);}
.stamp{display:inline-block;border:2px solid rgba(0,229,255,.22);padding:7px 18px;font-family:var(--head);font-size:.85rem;font-weight:900;letter-spacing:.35em;color:rgba(0,229,255,.22);transform:rotate(-2.5deg);margin-bottom:12px;}
.footer-sig{font-size:.35rem;letter-spacing:.12em;color:rgba(0,229,255,.2);line-height:2.3;}
.footer-wm{font-size:.42rem;letter-spacing:.07em;color:rgba(0,229,255,.17);margin-top:8px;}
/* ── GLOBAL WM ── */
.wm{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:.44rem;letter-spacing:.1em;color:rgba(0,229,255,.13);white-space:nowrap;z-index:100;pointer-events:none;text-shadow:0 0 12px rgba(0,229,255,.18);animation:wmB 8s ease-in-out infinite;}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="layer l-scan"></div>
<div class="layer l-vig"></div>
<div class="layer l-sweep"></div>
<div class="layer l-err"></div>

<!-- ── LOADER ── -->
<div id="ph-loader">
  <div class="shield-wrap">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <svg class="sh-svg" viewBox="0 0 154 184" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="sg" x1="0" y1="0" x2="154" y2="184" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#071828"/><stop offset="55%" stop-color="#040f18"/><stop offset="100%" stop-color="#020a10"/></linearGradient>
        <linearGradient id="eg" x1="0" y1="0" x2="154" y2="184" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00e5ff"/><stop offset="60%" stop-color="#00bcd4" stop-opacity=".7"/><stop offset="100%" stop-color="#004d66" stop-opacity=".3"/></linearGradient>
        <radialGradient id="shine" cx="32%" cy="20%" r="52%"><stop offset="0%" stop-color="rgba(0,229,255,.16)"/><stop offset="100%" stop-color="rgba(0,0,0,0)"/></radialGradient>
        <filter id="gf" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="2.5" result="b"/><feComposite in="SourceGraphic" in2="b" operator="over"/></filter>
      </defs>
      <path d="M77 4 L149 30 L149 95 C149 141 77 180 77 180 C77 180 5 141 5 95 L5 30 Z" fill="url(#sg)" stroke="url(#eg)" stroke-width="2.2" filter="url(#gf)"/>
      <path d="M77 14 L140 37 L140 95 C140 134 77 170 77 170 C77 170 14 134 14 95 L14 37 Z" fill="none" stroke="rgba(0,229,255,.12)" stroke-width=".8"/>
      <path d="M50 46 L57 42 L64 46 L64 54 L57 58 L50 54Z" fill="rgba(0,229,255,.04)" stroke="rgba(0,229,255,.1)" stroke-width=".5"/>
      <path d="M78 46 L85 42 L92 46 L92 54 L85 58 L78 54Z" fill="rgba(0,229,255,.04)" stroke="rgba(0,229,255,.1)" stroke-width=".5"/>
      <line class="cp d1" x1="26" y1="66" x2="66" y2="66" stroke="rgba(0,229,255,.38)" stroke-width=".9"/>
      <line class="cp d2" x1="66" y1="66" x2="66" y2="88" stroke="rgba(0,229,255,.38)" stroke-width=".9"/>
      <line class="cp d2" x1="88" y1="66" x2="128" y2="66" stroke="rgba(0,229,255,.38)" stroke-width=".9"/>
      <line class="cp d3" x1="88" y1="66" x2="88" y2="88" stroke="rgba(0,229,255,.38)" stroke-width=".9"/>
      <line class="cp d3" x1="26" y1="116" x2="128" y2="116" stroke="rgba(0,229,255,.22)" stroke-width=".8"/>
      <line class="cp d4" x1="26" y1="66" x2="26" y2="116" stroke="rgba(0,229,255,.18)" stroke-width=".6"/>
      <line class="cp d4" x1="128" y1="66" x2="128" y2="116" stroke="rgba(0,229,255,.18)" stroke-width=".6"/>
      <circle class="rot" cx="77" cy="88" r="24" fill="none" stroke="rgba(0,229,255,.22)" stroke-width=".8" stroke-dasharray="6 4"/>
      <circle class="rot2" cx="77" cy="88" r="16" fill="none" stroke="rgba(0,229,255,.15)" stroke-width=".6" stroke-dasharray="3 6"/>
      <rect x="68" y="83" width="18" height="13" rx="2.5" fill="rgba(0,229,255,.08)" stroke="#00e5ff" stroke-width="1.2" opacity=".8"/>

/* ════════════════════════════════════════
   UTILS
════════════════════════════════════════ */
const $  = id => document.getElementById(id);
const mk = (tag, cls, txt) => { const e = document.createElement(tag); if(cls) e.className=cls; if(txt!==undefined) e.textContent=txt; return e; };
const rHex = n => Array.from({length:n}, ()=>(Math.random()*16|0).toString(16)).join('').toUpperCase();

/* ════════════════════════════════════════
   LANG MODULE — URL hash routing
   Format: #/docs/privacy?lang=pl
════════════════════════════════════════ */
const Lang = (() => {
  let cur = CFG.DEFAULT;
  const detect = () => {
    const m = location.hash.match(/[?&]lang=([a-z]{2,5})/i);
    const req = m ? m[1].toLowerCase() : CFG.DEFAULT;
    cur = CFG.LANGS.includes(req) ? req : CFG.DEFAULT;
    document.documentElement.lang = cur;
    return cur;
  };
  const set = lang => {
    if (!CFG.LANGS.includes(lang)) return;
    const base = location.hash.replace(/([?&])lang=[a-z]{2,5}/i,'$1').replace(/[?&]$/,'') || '#/docs/privacy';
    location.replace(base + (base.includes('?') ? '&' : '?') + 'lang=' + lang);
  };
  const t = () => I18N[cur] || I18N[CFG.DEFAULT];
  return { detect, set, get:()=>cur, t };
})();

/* ════════════════════════════════════════
   CANVAS MODULE
════════════════════════════════════════ */
const Canvas = (() => {
  const cv = $('bg'), cx = cv.getContext('2d');
  let W, H, drops=[], lastTs=0, hs;
  const resize = () => {
    W=cv.width=innerWidth; H=cv.height=innerHeight;
    hs=CFG.HS*Math.sqrt(3);
    drops=Array.from({length:Math.ceil(W/13)}, ()=>Math.random()*-60);
  };
  const hexGrid = () => {
    cx.strokeStyle='rgba(0,229,255,0.027)'; cx.lineWidth=.5;
    for(let r=0;r*hs<H+hs;r++) for(let c=0;c*CFG.HS*1.5<W+CFG.HS;c++) {
      const x=c*CFG.HS*1.5, y=r*hs+(c%2?hs/2:0);
      cx.beginPath();
      for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;i?cx.lineTo(x+CFG.HS*Math.cos(a),y+CFG.HS*Math.sin(a)):cx.moveTo(x+CFG.HS*Math.cos(a),y+CFG.HS*Math.sin(a));}
      cx.closePath(); cx.stroke();
    }
  };
  const frame = () => {
    cx.fillStyle='rgba(2,4,7,0.045)'; cx.fillRect(0,0,W,H); hexGrid();
    cx.font='12px monospace';
    drops.forEach((y,i)=>{
      const ch=CFG.CHARS[Math.random()*CFG.CHARS.length|0], r=Math.random();
      cx.fillStyle=r>.97?'#00ffff':r>.8?'#007090':'#003a4a';
      cx.fillText(ch,i*13,y*13);
      if(y*13>H&&Math.random()>.975)drops[i]=0;
      drops[i]++;
    });
  };
  const loop = ts => { if(ts-lastTs>1000/CFG.FPS){frame();lastTs=ts;} requestAnimationFrame(loop); };
  const init = () => {
    resize(); let rt; addEventListener('resize',()=>{clearTimeout(rt);rt=setTimeout(resize,150);});
    requestAnimationFrame(loop);
  };
  return { init, setOpacity: v => cv.style.opacity = v };
})();

/* ════════════════════════════════════════
   LOADER MODULE
════════════════════════════════════════ */
const Loader = (() => {
  const statEl=$('status'), cur=statEl.querySelector('.cur');
  const pctEl=$('pct'), hexrow=$('hexrow');
  const segs=Array.from({length:CFG.SEGS},()=>{ const d=mk('div','hs'); hexrow.appendChild(d); return d; });
  let msgIdx=-1, tTimer=null, p=0;
  statEl.style.transition='opacity .2s';

  const typeMsg = msg => {
    clearInterval(tTimer); let i=0;
    [...statEl.childNodes].forEach(n=>{if(n!==cur)n.remove();});
    tTimer=setInterval(()=>{ if(i>=msg.length){clearInterval(tTimer);return;} statEl.insertBefore(document.createTextNode(msg[i++]),cur); },28);
  };
  const setMsg = idx => {
    if(idx===msgIdx)return; msgIdx=idx;
    statEl.style.opacity='0';
    setTimeout(()=>{ statEl.style.opacity='.7'; typeMsg(Lang.t().boot[idx]); },180);
  };
  const updateBar = pct => {
    const f=Math.floor(pct/100*CFG.SEGS);
    segs.forEach((s,i)=>{ s.className='hs'+(i<f-1?' on':i===f-1?' hd':''); });
    pctEl.textContent=Math.floor(pct)+'%';
  };

  const tick = done => {
    p=Math.min(p+Math.random()*(CFG.STEP_MAX-CFG.STEP_MIN)+CFG.STEP_MIN, 100);
    updateBar(p);
    setMsg(Math.min(Math.floor(p/100*(Lang.t().boot.length-1)),Lang.t().boot.length-1));
    if(p<100) setTimeout(()=>tick(done), Math.random()*(CFG.TICK_MAX-CFG.TICK_MIN)+CFG.TICK_MIN);
    else done();
  };

  document.querySelectorAll('.node').forEach((nd,i)=>{
    nd.style.animation=`ndP 2s ease-in-out infinite ${i*.4}s`;
    nd.querySelector('.nd').style.animation=`ndG 2s ease-in-out infinite ${i*.4}s`;
  });

  return { start: done => setTimeout(()=>tick(done), CFG.BOOT_DELAY) };
})();

/* ════════════════════════════════════════
   DOSSIER MODULE
════════════════════════════════════════ */
const Dossier = (() => {
  let threats=0, upSecs=0, thrTimer=null, upTimer=null;
  let thrEl=null, upEl=null;

  /* DOM builders — all textContent, no innerHTML → XSS-safe */
  const mrow = (k,v,extra='') => {
    const r=mk('div','mrow'), kk=mk('span','mk',k), vv=mk('span','mv'+extra,v);
    r.append(kk,vv); return r;
  };
  const badge = (txt,cls='') => mk('div','badge'+cls,txt);
  const artBlock = art => {
    const wrap=mk('div','article');
    // header
    const hdr=mk('div','art-hdr'), num=mk('span','art-num',`// ARTICLE ${art.n}`), line=mk('div','art-line');
    hdr.append(num,line); wrap.appendChild(hdr);
    wrap.appendChild(mk('div','art-h2',art.t));
    const body=mk('div','art-body');
    art.b.forEach(blk=>{
      if(blk.p!==undefined){body.appendChild(mk('p','',blk.p));}
      else if(blk.ol){const ol=mk('ol'); blk.ol.forEach(s=>{ol.appendChild(mk('li','',s));}); body.appendChild(ol);}
      else if(blk.link!==undefined){
        const a=mk('a','',blk.link);
        a.href=(blk.link.includes('@')?'mailto:':'https://')+blk.link;
        if(!blk.link.includes('@')){a.target='_blank'; a.rel='noopener noreferrer';}
        body.appendChild(a);
      }
      else if(blk.contact){
        const div=mk('div','art-contact');
        blk.contact.forEach((line,i)=>{
          if(line.includes('@')){const a=mk('a','',line); a.href='mailto:'+line; div.appendChild(a);}
          else if(line.includes('.')&&!line.includes(' ')){const a=mk('a','',line); a.href='https://'+line; a.target='_blank'; a.rel='noopener noreferrer'; div.appendChild(a);}
          else div.appendChild(document.createTextNode(line));
          if(i<blk.contact.length-1)div.appendChild(mk('br'));
        });
        body.appendChild(div);
      }
    });
    if(art.note){const n=mk('div','art-note',art.note); body.appendChild(n);}
    if(art.badges){const br=mk('div','badge-row'); br.style.marginTop='10px'; art.badges.forEach(b=>br.appendChild(badge(b))); body.appendChild(br);}
    wrap.appendChild(body);
    return wrap;
  };

  const render = lang => {
    const t=I18N[lang]||I18N[CFG.DEFAULT];
    const dos=$('ph-dossier');
    dos.innerHTML=''; // safe: we control all content below

    /* ── cls-bar ── */
    const bar=mk('div','cls-bar');
    const clsTag=mk('span','cls-tag',t.cls);
    // lang switcher
    const sw=mk('div','lang-sw');
    CFG.LANGS.forEach(l=>{
      const btn=mk('button','lbtn'+(l===lang?' active':''),l.toUpperCase());
      btn.setAttribute('aria-label','Switch language to '+l);
      btn.addEventListener('click',()=>Lang.set(l));
      sw.appendChild(btn);
    });
    const sessEl=mk('span','cls-sess',t.sess+': '+rHex(4)+'-'+rHex(4));
    bar.append(clsTag,sw,sessEl);
    dos.appendChild(bar);

    /* ── inner ── */
    const inner=mk('div','dos-inner');

    /* meta */
    const meta=mk('div','meta-block');
    meta.appendChild(mk('div','bc'));
    const mv=t.mk;
    [
      [mv.case,'SF-PRIVACY-2026-001'],
      [mv.upd,'18-APR-2026'],[mv.eff,'01-JAN-2020'],
      [mv.org,'POLAND // SECTOR 404 // SecFERROworld'],
      [mv.ent,'SecFERRO DIVISION × anonymousik'],
      [mv.ch,'im@anonymousik.is-a.dev'],
      [mv.clr,'FERRO-7 / GDPR-TIER-1 / EU-AI-ACT-2026'],
      [mv.hash, rHex(8)+'...'+rHex(4),' hash'],
      [mv.zk,t.mk.zkv,' g'],
    ].forEach(([k,v,c])=>meta.appendChild(mrow(k,v,c||'')));
    inner.appendChild(meta);

    /* live metrics */
    const liveRow=mk('div','live-row');
    const cards=[
      {lbl:t.lc.thr,  id:'thr-ct', cls:'g', prefix:'<dot g>'},
      {lbl:t.lc.enc,  val:'AES-256-GCM', cls:'g', dot:'g'},
      {lbl:t.lc.up,   id:'up-ct',  cls:'', dot:null},
      {lbl:t.lc.ano,  val:'ERROR-404', cls:'r', dot:'r'},
    ];
    cards.forEach(c=>{
      const card=mk('div','lcard');
      card.appendChild(mk('div','lc-lbl',c.lbl));
      const val=mk('div','lc-val'+(c.cls?' '+c.cls:''));
      if(c.dot){const d=mk('span','dot '+c.dot); val.appendChild(d);}
      const span=mk('span'); span.textContent=c.val||'00:00'; val.appendChild(span);
      if(c.id==='thr-ct')thrEl=span;
      if(c.id==='up-ct')upEl=span;
      card.appendChild(val); liveRow.appendChild(card);
    });
    inner.appendChild(liveRow);

    /* badges */
    const bdg=mk('div','badge-row');
    ['✓ GDPR / RODO','✓ EU AI ACT 2026','✓ ZK-PROOF','✓ PQ-KYBER-1024','◈ AES-256-GCM','◈ ANONYMOUSIK CERT','⚠ SECTOR 404','⚠ WE ARE LEGION'].forEach((b,i)=>{
      bdg.appendChild(badge(b,i>5?' r':i>4?'':' g'));
    });
    inner.appendChild(bdg);

    /* policy header */
    const ph=mk('div','pol-head');
    const ptitle=mk('div','pol-title'); ptitle.textContent=t.pt[0]+' '; const em=mk('em','',t.pt[1]); ptitle.appendChild(em);
    ph.appendChild(ptitle);
    ph.appendChild(mk('div','pol-div'));
    ph.appendChild(mk('div','pol-dates',t.dates));
    const ent=mk('div','pol-entity');
    ent.appendChild(document.createTextNode('SecFERRO DIVISION × anonymousik\n'));
    const rdct=mk('span','rdct','🅽ɨɛʐռǟռa-🅽ɨӄօʍʊ, 404'); ent.appendChild(rdct);
    ent.appendChild(document.createTextNode(', SecFERROworld ERROR-404, Poland\n'));
    const ma=mk('a','','im@anonymousik.is-a.dev'); ma.href='mailto:im@anonymousik.is-a.dev'; ent.appendChild(ma);
    ent.appendChild(document.createTextNode(' | '));
    const wa=mk('a','','anonymousik.is-a.dev'); wa.href='https://anonymousik.is-a.dev'; wa.target='_blank'; wa.rel='noopener noreferrer'; ent.appendChild(wa);
    ph.appendChild(ent);
    inner.appendChild(ph);

    /* intro */
    inner.appendChild(mk('p','intro-p',t.intro));

    /* articles */
    t.arts.forEach((art,i)=>{
      const a=artBlock(art);
      a.style.animationDelay=(i*.15)+'s';
      inner.appendChild(a);
    });

    /* PGP/signature */
    const sigWrap=mk('div','article'); sigWrap.style.animationDelay='.75s';
    const shdr=mk('div','art-hdr'); shdr.append(mk('span','art-num',t.sig.t),mk('div','art-line'));
    sigWrap.appendChild(shdr);
    const pgp=mk('div','pgp-block');
    [
      ['PGP FINGERPRINT',rHex(4)+' '+rHex(4)+' '+rHex(4)+' '+rHex(4)+' '+rHex(4)],
      ['SIGNING KEY',t.sig.signer],
      ['ALGORITHM',t.sig.algo],
      ['TIMESTAMP',new Date().toISOString().replace('T',' ').slice(0,19)+' UTC'],
      ['BLOCKCHAIN ANCHOR','0x'+rHex(16)],
    ].forEach(([k,v])=>{
      const row=mk('div'); row.appendChild(document.createTextNode(k+': ')); row.appendChild(mk('span','pv',v)); pgp.appendChild(row);
    });
    sigWrap.appendChild(pgp);
    inner.appendChild(sigWrap);

    /* footer */
    const foot=mk('div','dos-footer');
    foot.appendChild(mk('div','stamp',t.stamp));
    const sig=mk('div','footer-sig');
    t.footer.forEach(line=>{const d=mk('div','',line); sig.appendChild(d);});
    sig.appendChild(mk('div','',t.legal));
    foot.appendChild(sig);
    foot.appendChild(mk('div','footer-wm','•``•.༼X🌐༼X.•``• Ⱥ🅽ටꈤYMටꪊSƗꀘ.IS-A.DEV •``•.༼X🌐༼X.•``•'));
    inner.appendChild(foot);

    dos.appendChild(inner);

    /* redact auto-reveal */
    setTimeout(()=>rdct.classList.add('show'),1200);
  };

  const startMetrics = () => {
    threats=CFG.THREAT_BASE+Math.floor(Math.random()*CFG.THREAT_VAR);
    if(thrEl) thrEl.textContent=threats.toLocaleString();
    thrTimer=setInterval(()=>{ threats+=Math.random()*3|0; if(thrEl)thrEl.textContent=threats.toLocaleString(); },CFG.THREAT_TICK);
    upTimer=setInterval(()=>{ upSecs++; if(upEl)upEl.textContent=String(upSecs/60|0).padStart(2,'0')+':'+String(upSecs%60).padStart(2,'0'); },1000);
  };

  return { render, startMetrics };
})();

/* ════════════════════════════════════════
   PHASE TRANSITIONS
════════════════════════════════════════ */
const setAccess = (t, show) => {
  $('ag-top').textContent=t.ag.top;
  $('ag-main').textContent=t.ag.main;
  $('ag-sub').textContent=t.ag.sub;
  $('ag-cls').textContent=t.ag.cls;
  $('ph-access').classList.toggle('active',show);
};

const onComplete = () => {
  const t=Lang.t();
  $('ph-loader').classList.add('out');
  setTimeout(()=>{
    setAccess(t,true);
    setTimeout(()=>{
      setAccess(t,false);
      const lang=Lang.get();
      Dossier.render(lang);
      Dossier.startMetrics();
      setTimeout(()=>{ $('ph-dossier').classList.add('active'); Canvas.setOpacity('.3'); },200);
    }, CFG.ACCESS_DUR);
  },600);
};

/* ════════════════════════════════════════
   HASH CHANGE → RE-RENDER DOSSIER
════════════════════════════════════════ */
addEventListener('hashchange', () => {
  const lang=Lang.detect();
  if($('ph-dossier').classList.contains('active')){
    const scroll=$('ph-dossier').scrollTop;
    Dossier.render(lang);
    $('ph-dossier').scrollTop=scroll;
  }
});

/* ════════════════════════════════════════
   BOOT
════════════════════════════════════════ */
Canvas.init();
Lang.detect();
Loader.start(onComplete);

})();
