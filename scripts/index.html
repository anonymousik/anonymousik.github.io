function getParams(){
  const p=new URLSearchParams(location.search);
  let tool=p.get('tool');
  // shorthand: ?scu, ?tmux_setup
  if(!tool) for(const k of ['scu','tmux_setup']) if(p.has(k)){tool=k;break;}
  return {tool, panel:p.get('panel')||p.get('section'), hash:location.hash.slice(1)};
}

function navigate(tool,anchor){
  let url=location.pathname;
  if(tool) url+='?tool='+tool;
  if(anchor) url+='#'+anchor;
  history.pushState({tool,anchor},'',url);
  render();
  scroll2(anchor);
}

function scroll2(id){
  if(!id) return window.scrollTo({top:0,behavior:'smooth'});
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},120);
}

window.addEventListener('popstate',render);

function render(){
  const {tool,panel,hash}=getParams();
  const app=document.getElementById('app');
  const titles={scu:'Smart Compile Ultimate v2.0 · Scripts · SecFERRO',tmux_setup:'tmux_setup v5.0 · Scripts · SecFERRO'};
  document.getElementById('pg-title').textContent=tool&&titles[tool]||'Scripts — SecFERRO Division · Anonymousik';
  app.innerHTML=tool==='scu'?vSCU():tool==='tmux_setup'?vTmux():vHome();
  initCopy();
  if(hash)scroll2(hash);
  else if(!tool)window.scrollTo({top:0});
  if(panel)setTimeout(()=>{const el=document.getElementById(panel)||document.querySelector('[data-panel="'+panel+'"]');if(el){el.scrollIntoView({behavior:'smooth'});el.classList.add('hl-pulse');}},250);
  initTOC(tool);
}

// ═══════════════════════════════════════════════
//  COPY UTIL
// ═══════════════════════════════════════════════
function cp(btn,text){
  navigator.clipboard.writeText(text).catch(()=>{var t=document.createElement('textarea');t.value=text;t.style.cssText='position:fixed;opacity:0';document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);});
  var o=btn.textContent;btn.textContent='COPIED ✓';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent=o;btn.classList.remove('ok');},2000);
}
function initCopy(){
  document.querySelectorAll('[data-copy]').forEach(btn=>{
    btn.addEventListener('click',()=>cp(btn,btn.getAttribute('data-copy')));
  });
}

// ═══════════════════════════════════════════════
//  TOC ACTIVE STATE
// ═══════════════════════════════════════════════
let _obs=null;
function initTOC(tool){
  if(_obs){_obs.disconnect();_obs=null;}
  const secs=document.querySelectorAll('section[id]');
  const links=document.querySelectorAll('.toc-link,.toc-link-bl');
  if(!secs.length)return;
  _obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        links.forEach(l=>l.classList.remove('on'));
        const a=document.querySelector(`.toc-link[href="#${e.target.id}"],.toc-link-bl[href="#${e.target.id}"]`);
        if(a){a.classList.add('on');history.replaceState({},'',location.search+'#'+e.target.id);}
      }
    });
  },{rootMargin:'-20% 0px -65% 0px'});
  secs.forEach(s=>_obs.observe(s));
}

// tmux builder
function buildTmux(){
  const mods=MODS.filter((_,i)=>{const el=document.getElementById(`tm${i+1}`);return el&&el.checked;}).map(m=>m.id);
  const opts=['to1','to2','to3'].filter(id=>{const el=document.getElementById(id);return el&&el.checked;}).map(id=>id==='to1'?'--dry-run':id==='to2'?'--no-ui':'--verbose');
  let cmd=`bash <(curl -sL ${TMUX})`;
  if(mods.length) cmd+=` --dev ${mods.join(',')}`;
  opts.forEach(f=>cmd+=` ${f}`);
  const el=document.getElementById('tmux-gen');
  if(el) el.textContent=cmd;
}

function cpGen(genId,btnId){
  const gen=document.getElementById(genId);
  const btn=document.getElementById(btnId);
  if(gen&&btn) cp(btn,gen.textContent);
}

// SCU builder
function buildSCU(){
  const repo=(document.getElementById('sb-repo')||{value:'myOrg/myApp'}).value||'myOrg/myApp';
  const branch=(document.getElementById('sb-branch')||{value:'main'}).value||'main';
  const vs=['sv1','sv2'].filter(id=>{const el=document.getElementById(id);return el&&el.checked;}).map(id=>id==='sv1'?'debug':'release');
  const fl=[['sf1','--yes'],['sf2','--skip-push'],['sf3','--skip-download'],['sf4','--dry-run'],['sf5','--no-secret-scan'],['sf6','--no-checksums']].filter(([id])=>{const el=document.getElementById(id);return el&&el.checked;}).map(([,f])=>f);
  let cmd=`scu.sh --repo ${repo} --branch ${branch}`;
  if(vs.length) cmd+=` --variants ${vs.join(',')}`;
  fl.forEach(f=>cmd+=` ${f}`);
  const el=document.getElementById('scu-gen');
  if(el) el.textContent=cmd;
}
