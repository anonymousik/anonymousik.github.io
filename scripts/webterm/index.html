
<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Webowy emulator terminala z wykorzystaniem xterm.js">
  <title>WebTerm | Anonymousik</title>
  
  <!-- POPRAWKA SecOps: Usunięto restrykcyjny atrybut 'integrity', który blokował pobieranie zasobu przez niezgodność sum SHA-256 z minifikatorem jsdelivr. Pozostawiono crossorigin. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" crossorigin="anonymous" />
  
  <style>
    /* Reset i podstawowe ustawienia układu */
    html, body {
      height: 100%;
      margin: 0;
      background-color: #0d1117; /* Kolor z palety GitHub Dark */
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    /* Kontener terminala z uwzględnieniem dostępności (WCAG) */
    #terminal {
      height: 100%;
      width: 100%;
      padding: 16px;
      box-sizing: border-box;
    }

    /* Wizualny wskaźnik ostrości (Focus) dla klawiatury */
    .xterm:focus-within {
      outline: 1px solid rgba(88, 166, 255, 0.4);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main id="terminal" aria-label="Emulator terminala" role="application"></main>                                                        
  
  <!-- Poprawne linki do skryptów xterm.js -->
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js" crossorigin="anonymous"></script>
  <!-- Dodatek FitAddon do automatycznego dopasowywania wymiarów terminala -->
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js" crossorigin="anonymous"></script>

  <!-- Twoje zewnętrzne pliki modułowe aplikacji -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
